<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan to Pay - Fraud Detection</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: #A6B1E1;
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
}

/* MAIN CONTAINER */

.container { 
    background: #DCD6F7; 
    padding: 40px; 
    border-radius: 20px; 
    box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
    text-align: center; 
    max-width: 500px; 
}

/* TITLE */

h1 { 
    color: #424874; 
    margin-bottom: 10px; 
    font-size: 28px; 
}

.subtitle { 
    color: #424874; 
    opacity: 0.8;
    margin-bottom: 30px; 
}

/* QR BOX */

.qr-box { 
    background: #F4EEFF; 
    padding: 30px; 
    border-radius: 15px; 
    margin: 20px 0; 
}

.qr-box img { 
    max-width: 300px; 
    border: 3px solid #424874; 
    border-radius: 10px; 
}

/* STATUS */

.status { 
    margin-top: 30px; 
    padding: 20px; 
    border-radius: 10px; 
    display: none; 
}

.status.fraud { 
    background: #fdecea; 
    border: 2px solid #d32f2f; 
}

.status.normal { 
    background: #e8f5e9; 
    border: 2px solid #2e7d32; 
}

.status h2 { 
    margin-bottom: 10px; 
}

.status.fraud h2 { 
    color: #d32f2f; 
}

.status.normal h2 { 
    color: #2e7d32; 
}

/* BUTTON */

.btn { 
    background: #424874; 
    color: white; 
    padding: 12px 30px; 
    border: none; 
    border-radius: 25px; 
    cursor: pointer; 
    font-size: 16px; 
    margin-top: 20px; 
    text-decoration: none; 
    display: inline-block; 
    font-weight: bold;
}

.btn:hover { 
    background: #5a639c; 
}

/* URL BOX */

.url-box { 
    background: #F4EEFF; 
    padding: 10px; 
    border-radius: 5px; 
    margin: 15px 0; 
    word-break: break-all; 
    font-size: 12px; 
    color: #424874; 
}
</style>
</head>
<body>
    <div class="container">
        <h1>🔒 Secure Payment Gateway</h1>
        <p class="subtitle">Scan QR code to make payment</p>
        
        <div class="qr-box">
            <img src="data:image/png;base64,{{ qr_code }}" alt="Payment QR Code">
        </div>
        
        <div class="url-box">
            <strong>Payment URL:</strong><br>{{ payment_url }}
            {% if ngrok_url %}
            <br><br>
            <strong style="color: #667eea;">🌐 Public URL (Share this):</strong><br>{{ ngrok_url }}
            {% endif %}
        </div>
        
        <div id="status" class="status">
            <h2 id="statusText"></h2>
            <p id="statusDetails"></p>
        </div>
        
        <a href="/" class="btn">Back to Dashboard</a>
    </div>

    <script>
        const socket = io();
        
        socket.on('transaction_result', function(data) {
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            const statusDetails = document.getElementById('statusDetails');
            
            statusDiv.style.display = 'block';
            
            if (data.fraud) {
                statusDiv.className = 'status fraud';
                statusText.textContent = '🚨 FRAUD DETECTED!';
                statusDetails.innerHTML = `Fraud Probability: <strong>${data.probability}%</strong><br>Transaction blocked for security.`;
            } else {
                statusDiv.className = 'status normal';
                statusText.textContent = '✅ PAYMENT SUCCESSFUL';
                statusDetails.innerHTML = `Fraud Probability: <strong>${data.probability}%</strong><br>Transaction approved.`;
            }
        });
    </script>
</body>
</html>
