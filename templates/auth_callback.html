<!DOCTYPE html>
<html>
<head>
    <title>Verifying...</title>
    <style>
body { font-family: Arial, sans-serif; background: #A6B1E1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.card { background: #DCD6F7; padding: 40px; border-radius: 10px; text-align: center; max-width: 360px; }
h2 { color: #424874; margin-bottom: 10px; }
p { color: #555; }
.error h2 { color: #d32f2f; }
    </style>
</head>
<body>
<div class="card" id="card">
    <h2>Verifying...</h2>
    <p>Please wait.</p>
</div>
<script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get("access_token");

    if (access_token) {
        fetch("/auth/session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ access_token })
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === "verified") {
                document.getElementById("card").innerHTML = "<h2>✅ Verified!</h2><p>You can close this tab.</p>";
                setTimeout(() => window.close(), 1500);
            } else {
                showError("Verification failed. Please try again.");
            }
        })
        .catch(() => showError("Something went wrong. Please try again."));
    } else {
        showError("Invalid or expired link.");
    }

    function showError(msg) {
        const card = document.getElementById("card");
        card.classList.add("error");
        card.innerHTML = `<h2>❌ Error</h2><p>${msg}</p>`;
    }
</script>
</body>
</html>
