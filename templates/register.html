<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background: #A6B1E1;
    color: #000;
    padding: 40px;
}

/* CARD */

.card {
    max-width: 400px;
    margin: auto;
    background: #DCD6F7;
    padding: 30px;
    border-radius: 10px;
}

/* TITLE */

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #424874;
}

/* FORM */

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    color: #424874;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #A6B1E1;
    outline: none;
    background: #F4EEFF;
    font-weight: 600;
}

input:focus {
    border-color: #424874;
}

/* BUTTON */

button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #424874;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #5a639c;
}

/* LINKS */

.link {
    text-align: center;
    margin-top: 15px;
}

a {
    color: #424874;
    text-decoration: none;
    font-weight: bold;
}

/* ERROR */

.error {
    color: #d32f2f;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">
    <h2>User Registration</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="error">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>

</body>
</html>
