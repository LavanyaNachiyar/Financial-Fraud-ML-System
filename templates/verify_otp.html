<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
body {
    font-family: Arial, sans-serif;
    background: #A6B1E1;
    color: #000;
    padding: 40px;
}
.card {
    max-width: 400px;
    margin: auto;
    background: #DCD6F7;
    padding: 30px;
    border-radius: 10px;
}
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #424874;
}
label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    color: #424874;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #A6B1E1;
    outline: none;
    background: #F4EEFF;
    font-weight: 600;
    box-sizing: border-box;
    letter-spacing: 4px;
    font-size: 18px;
    text-align: center;
}
input[name="username"] {
    letter-spacing: normal;
    font-size: 14px;
    text-align: left;
}
input:focus { border-color: #424874; }
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #424874;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
button:hover { background: #5a639c; }
.link { text-align: center; margin-top: 15px; }
.link a { color: #424874; text-decoration: none; font-weight: bold; }
.msg { text-align: center; margin-bottom: 10px; padding: 8px; border-radius: 6px; }
.msg.success { background: #e8f5e9; color: #2e7d32; }
.msg.danger { background: #fdecea; color: #d32f2f; }
.subtitle { text-align: center; color: #555; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Enter OTP</h2>
    <p class="subtitle">Check your email for the 6-digit code</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <p class="msg {{ category }}">{{ message }}</p>
      {% endfor %}
    {% endwith %}

    <form method="POST">
        {% if show_username %}
        <label>Username <span style="color:#888;font-weight:normal">(first time only)</span></label>
        <input type="text" name="username" placeholder="Choose a username" required style="letter-spacing:normal;font-size:14px;text-align:left;">
        {% endif %}

        <label>OTP Code</label>
        <input type="text" name="otp" maxlength="6" placeholder="000000" required autofocus>

        <button type="submit">Verify & Login</button>
    </form>

    <div class="link">
        <a href="{{ url_for('login') }}">← Use a different email</a>
    </div>
</div>
</body>
</html>
