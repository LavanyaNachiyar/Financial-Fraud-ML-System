<!DOCTYPE html>
<html>
<head>
    <title>Check your email</title>
    <style>
body { font-family: Arial, sans-serif; background: #A6B1E1; color: #000; padding: 40px; }
.card { max-width: 420px; margin: auto; background: #DCD6F7; padding: 35px; border-radius: 10px; text-align: center; }
h2 { color: #424874; margin-bottom: 10px; }
p { color: #444; margin-bottom: 20px; line-height: 1.6; }
.email { font-weight: bold; color: #424874; }
.spinner { width: 40px; height: 40px; border: 4px solid #A6B1E1; border-top-color: #424874; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 13px; color: #666; margin-top: 10px; }
.link a { color: #424874; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>📧 Check your email</h2>
    <p>We sent a magic link to<br><span class="email">{{ session.get('otp_email', 'your email') }}</span><br><br>Click the link in the email to sign in. This tab will update automatically.</p>
    <div class="spinner"></div>
    <p class="status" id="status">Waiting for you to click the link...</p>
    <div class="link"><a href="{{ url_for('login') }}">← Use a different email</a></div>
</div>
<script>
    const interval = setInterval(() => {
        fetch("/auth/check")
            .then(r => r.json())
            .then(data => {
                if (data.logged_in) {
                    clearInterval(interval);
                    document.getElementById("status").textContent = "✅ Logged in! Redirecting...";
                    window.location.href = "/";
                }
            });
    }, 2000);
</script>
</body>
</html>
